# nginx proxy address - http://172.17.0.1:5006

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  actualbudget:
    image: actualbudget/actual-server:latest
    container_name: actualbudget-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - actualbudget
    ports:
      - "5006:5006"
    environment:
      TZ: ${TZ:-America/New_York}
    volumes:
      - ./volumes/data/actualbudget:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5006"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  actualbudget:
    external: false
